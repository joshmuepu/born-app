name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build and package (Mac)
        run: npm run dist:mac -- --publish never

      - name: Upload Mac artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installers/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build and package (Windows)
        run: npm run dist:win -- --publish never

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installers/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build and package (Linux)
        run: npm run dist:linux -- --publish never

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installers/*.AppImage
